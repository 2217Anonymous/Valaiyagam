version: 1
# Next.js static export with trailingSlash: true
# Builds folder/index.html — URLs like /admin/login/ (never /admin/login.html)

frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - export NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-https://www.valaiyagam.com}
        - export NEXT_PUBLIC_BASE_PATH=${NEXT_PUBLIC_BASE_PATH:-}
        - npm run build
        - node scripts/verify-static-routes.mjs
  artifacts:
    baseDirectory: out
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*

  # Map extensionless URLs → folder routes (no .html in browser address bar)
  customRedirects:
    - source: "/admin"
      target: "/admin/login/"
      status: "302"
    - source: "/admin/login"
      target: "/admin/login/"
      status: "301"
    - source: "/admin/dashboard"
      target: "/admin/dashboard/"
      status: "301"
    - source: "/admin/employees"
      target: "/admin/employees/"
      status: "301"
    - source: "/admin/employees/new"
      target: "/admin/employees/new/"
      status: "301"
    - source: "/admin/teams"
      target: "/admin/teams/"
      status: "301"
    - source: "/admin/jobs"
      target: "/admin/jobs/"
      status: "301"
    - source: "/admin/jobs/new"
      target: "/admin/jobs/new/"
      status: "301"
    - source: "/admin/gallery"
      target: "/admin/gallery/"
      status: "301"
    - source: "/services"
      target: "/services/"
      status: "301"
    - source: "/teams"
      target: "/teams/"
      status: "301"
    - source: "/careers"
      target: "/careers/"
      status: "301"
    - source: "/careers/<*>"
      target: "/careers/<*>/"
      status: "301"
